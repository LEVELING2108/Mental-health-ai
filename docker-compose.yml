version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: sentimental-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./mental_health.db
      - LOG_LEVEL=INFO
    volumes:
      - ./mental_health.db:/app/mental_health.db
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: sentimental-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: always
