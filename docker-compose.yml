version: '3.8'

services:
  api:
    build: .
    container_name: mental-health-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    container_name: mental-health-ui
    ports:
      - "8501:8501"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
